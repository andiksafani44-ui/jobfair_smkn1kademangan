<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Tiket — Job Fair SKANEKA 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --orange: #E8650A;
    --orange2: #F7841F;
    --orange3: #FFB366;
    --orange-dim: rgba(232,101,10,0.12);
    --cream: #FFF8F2;
    --dark: #1A0800;
    --brown: #5C2800;
    --white: #FFFFFF;
    --gray: #8B6B5A;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(135deg, #1A0800 0%, #2D1200 50%, #1A0800 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    font-family: 'Poppins', sans-serif;
  }
  .ticket {
    width: 100%; max-width: 400px;
    animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes rise {
    from { opacity:0; transform:translateY(40px) scale(0.96); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }
  /* Header */
  .ticket-header {
    background: linear-gradient(135deg, var(--orange) 0%, var(--orange2) 100%);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 16px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 4px 20px rgba(232,101,10,0.4);
  }
  .logos { display:flex; align-items:center; gap:8px; }
  .logo-img { width:48px; height:48px; object-fit:contain; border-radius:8px; background:#fff; padding:3px; }
  .header-text { flex:1; }
  .header-school { font-size:10px; font-weight:600; color:rgba(255,255,255,0.85); letter-spacing:1px; text-transform:uppercase; }
  .header-title { font-size:15px; font-weight:800; color:#fff; line-height:1.2; }
  .etiket-badge {
    background: rgba(255,255,255,0.25);
    color: #fff;
    font-size: 9px; font-weight:700; letter-spacing:1.5px;
    padding: 4px 10px; border-radius:100px; text-transform:uppercase;
    border: 1px solid rgba(255,255,255,0.4);
  }
  /* Perforasi */
  .perforation {
    background: #2D1200;
    height: 22px; display:flex; align-items:center;
  }
  .perf-hole { width:22px; height:22px; background:#1A0800; border-radius:50%; flex-shrink:0; }
  .perf-line { flex:1; border-top:2px dashed rgba(232,101,10,0.3); }
  /* Body */
  .ticket-body {
    background: var(--cream);
    padding: 22px 22px 26px;
  }
  .event-badge {
    display:inline-block;
    background: var(--orange-dim);
    border: 1px solid rgba(232,101,10,0.3);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 10px; font-weight:600; color:var(--orange);
    letter-spacing:1px; text-transform:uppercase;
    margin-bottom: 10px;
  }
  .event-name {
    font-size: 28px; font-weight:800; color:var(--dark);
    line-height: 1.1; margin-bottom: 2px;
  }
  .event-name span { color:var(--orange); }
  .event-sub { font-size:11px; color:var(--gray); margin-bottom:18px; }
  .divider { height:1px; background:rgba(232,101,10,0.15); margin-bottom:16px; }
  .field-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--gray); margin-bottom:3px; }
  .field-nama { font-size:20px; font-weight:700; color:var(--dark); margin-bottom:14px; line-height:1.2; }
  .nopeserta-box {
    background: linear-gradient(135deg, var(--orange), var(--orange2));
    border-radius:12px; padding:12px 16px;
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 22px;
    box-shadow: 0 4px 16px rgba(232,101,10,0.3);
  }
  .nopeserta-label { font-size:9px; color:rgba(255,255,255,0.8); letter-spacing:1.5px; text-transform:uppercase; }
  .nopeserta-val { font-size:20px; font-weight:800; color:#fff; letter-spacing:1px; }
  .nopeserta-icon { font-size:26px; opacity:0.7; }
  /* QR */
  .qr-section { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .qr-hint { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gray); }
  .qr-frame {
    background:#fff;
    padding: 14px;
    border-radius: 16px;
    border: 2px solid rgba(232,101,10,0.2);
    box-shadow: 0 8px 30px rgba(232,101,10,0.15);
  }
  #qrcode { display:flex; justify-content:center; }
  .qr-id { font-size:10px; letter-spacing:2px; color:var(--gray); font-family:'Courier New',monospace; }
  /* Footer */
  .ticket-footer {
    background: linear-gradient(135deg, #2D1200, #1A0800);
    border-radius: 0 0 20px 20px;
    padding: 14px 20px;
    display:flex; align-items:center; justify-content:space-between;
    border-top: 1px solid rgba(232,101,10,0.2);
  }
  .footer-info { }
  .footer-date { font-size:12px; font-weight:700; color:var(--orange3); }
  .footer-loc { font-size:10px; color:rgba(255,255,255,0.4); margin-top:2px; }
  .footer-icon { font-size:28px; opacity:0.5; }
  /* Loading / Error */
  .center-state { text-align:center; padding:50px 20px; background:var(--cream); border-radius:20px; }
  .spinner { width:36px;height:36px;border:2px solid rgba(232,101,10,0.2);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px; }
  @keyframes spin{to{transform:rotate(360deg)}}
  .err-icon{font-size:44px;margin-bottom:10px;}
  .err-title{font-size:18px;font-weight:700;color:#C0392B;margin-bottom:6px;}
  .err-sub{font-size:12px;color:var(--gray);}
</style>
</head>

  <div class="center-state" id="loading">
    <div class="spinner"></div>

  </div>
</div>

const urlParams = new URLSearchParams(window.location.search);
const pesertaID = urlParams.get("id") || "";

async function loadTiket() {
  if (!pesertaID) { tampilError("Tiket Tidak Valid","Link tidak memiliki ID peserta."); return; }
  try {
    const fd = new FormData();
    fd.append("action","dataPeserta"); fd.append("id",pesertaID);
    const resp = await fetch(CONFIG.SCRIPT_URL,{method:"POST",body:fd});
    const data = await resp.json();
    if (data.sukses) tampilTiket(data); else tampilError("Peserta Tidak Ditemukan",data.pesan);
  } catch(e) { tampilError("Gagal Memuat","Periksa koneksi internet Anda."); }
}

function tampilTiket(p) {
  document.getElementById("ticket").innerHTML = `
    <div class="ticket-header">
      <div class="logos">
        <img class="logo-img" src="data:image/jpeg;base64,${LOGO_BKK}" alt="BKK">
        <img class="logo-img" src="data:image/jpeg;base64,${LOGO_SMK}" alt="SMKN1">
      </div>
      <div class="header-text">
        <div class="header-school">SMKN 1 Kademangan · Blitar</div>
        <div class="header-title">Bursa Kerja Khusus</div>
      </div>
      <div class="etiket-badge">E-Tiket</div>
    </div>
    <div class="perforation">
      <div class="perf-hole"></div><div class="perf-line"></div><div class="perf-hole"></div>
    </div>
    <div class="ticket-body">
      <div class="event-badge">Acara Resmi 2026</div>
      <div class="event-name">JOB FAIR<br><span>SKANEKA</span></div>
      <div class="event-sub">Bursa Kerja Khusus SMKN 1 Kademangan</div>
      <div class="divider"></div>
      <div class="field-label">Nama Peserta</div>
      <div class="field-nama">${p.nama}</div>
      <div class="nopeserta-box">
        <div>
          <div class="nopeserta-label">Nomor Peserta</div>
          <div class="nopeserta-val">${p.noPeserta}</div>
        </div>
        <div class="nopeserta-icon">🎫</div>
      </div>
      <div class="qr-section">
        <div class="qr-hint">Tunjukkan QR ini kepada panitia</div>
        <div class="qr-frame"><div id="qrcode"></div></div>
        <div class="qr-id">${pesertaID}</div>
      </div>
    </div>
    <div class="ticket-footer">
      <div class="footer-info">
        <div class="footer-date">${CONFIG.TANGGAL}</div>
        <div class="footer-loc">${CONFIG.LOKASI}</div>
      </div>
      <div class="footer-icon">📍</div>
    </div>
  `;
  new QRCode(document.getElementById("qrcode"),{
    text:pesertaID,width:185,height:185,
    colorDark:"#1A0800",colorLight:"#FFFFFF",
    correctLevel:QRCode.CorrectLevel.H
  });
}

function tampilError(j,p) {
  document.getElementById("ticket").innerHTML = `
    <div class="ticket-header"><div class="logos">
      <img class="logo-img" src="data:image/jpeg;base64,${LOGO_BKK}" alt="BKK">
      <img class="logo-img" src="data:image/jpeg;base64,${LOGO_SMK}" alt="SMKN1">
    </div><div class="header-text"><div class="header-school">SMKN 1 Kademangan · Blitar</div><div class="header-title">Job Fair SKANEKA 2026</div></div></div>
    <div class="center-state"><div class="err-icon">⚠️</div><div class="err-title">${j}</div><div class="err-sub">${p}</div></div>`;
}
loadTiket();
</script>
